name: Validate plugins.json

on:
  pull_request:
    paths:
      - plugins.json
      - 'plugins/**'
      - 'scripts/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate plugins.json
        run: node scripts/validate.js
